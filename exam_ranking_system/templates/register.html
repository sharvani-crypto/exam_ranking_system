<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Register — Exam &amp; Ranking System</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='/style.css') }}"/>
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar">
  <div class="nav-inner">
    <a href="{{ url_for('home') }}" class="nav-brand">
      <span class="brand-icon">🎓</span>
      Exam &amp; Ranking System
    </a>
    <div class="hamburger" id="hamburger"><span></span><span></span><span></span></div>
    <ul class="nav-links" id="nav-links">
      <li><a href="{{ url_for('home') }}">🏠 Home</a></li>
      <li><a href="{{ url_for('login') }}">Login</a></li>
      <li><a href="{{ url_for('register') }}" class="active">Register</a></li>
    </ul>
  </div>
</nav>

<!-- AUTH PAGE -->
<div class="auth-page">
  <div class="auth-container">
    <div class="auth-card animate-in">

      <div class="auth-logo">
        <div class="logo-circle">📝</div>
        <h2>Create Account</h2>
        <p>Register to start attempting exams</p>
      </div>

      {% if error %}
      <div class="auth-error">
        ⚠️ {{ error }}
      </div>
      {% endif %}

      <form method="POST" action="{{ url_for('register') }}" id="register-form">
        <div class="form-group">
          <label for="name">Full Name</label>
          <input
            type="text"
            id="name"
            name="name"
            placeholder="Your full name"
            required
            autocomplete="name"
          />
        </div>

        <div class="form-group">
          <label for="email">Email Address</label>
          <input
            type="email"
            id="email"
            name="email"
            placeholder="your@email.com"
            required
            autocomplete="email"
          />
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input
            type="password"
            id="password"
            name="password"
            placeholder="Min. 6 characters"
            required
            minlength="6"
            autocomplete="new-password"
          />
        </div>

        <div class="form-group">
          <label for="password2">Confirm Password</label>
          <input
            type="password"
            id="password2"
            name="password2"
            placeholder="Re-enter your password"
            required
            autocomplete="new-password"
          />
        </div>

        <div class="mt-2">
          <button type="submit" class="btn btn-red btn-full btn-lg">
            Create Account →
          </button>
        </div>
      </form>

      <div class="auth-footer">
        Already have an account?
        <a href="{{ url_for('login') }}">Login here</a>
      </div>

    </div>
  </div>
</div>

<!-- FOOTER -->
<footer class="footer">
  <div class="footer-inner">
    <div class="footer-brand">🎓 Exam &amp; Ranking System</div>
    <div class="footer-credit">B.Tech Mini Project · Data Structures &amp; Algorithms</div>
  </div>
</footer>

<script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
